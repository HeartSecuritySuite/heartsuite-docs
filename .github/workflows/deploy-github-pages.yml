name: Deployment to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - docs/v1.6.2
  pull_request:

env:
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_OWNER: ${{ github.repository_owner }}
  HUGO_VERSION: "0.155.3"
  GO_VERSION: "1.22.0"

# Required for the modern deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Install Go (direct, no Node.js dependency)
        run: |
          wget -O ${{ runner.temp }}/go.tar.gz \
            https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf ${{ runner.temp }}/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Setup Hugo (direct install, no Node.js dependency)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm ci

      - name: Download Go modules (Docsy)
        run: go mod download

      - name: Build main (v1.6.4)
        run: |
          hugo \
            --baseURL https://${REPO_OWNER}.github.io/${REPO_NAME} \
            --minify

      - name: Checkout docs/v1.6.2 branch for v1.6.3 build
        uses: actions/checkout@v5
        with:
          ref: docs/v1.6.2
          path: v163-build
          fetch-depth: 0

      - name: Install npm dependencies (v1.6.3)
        run: npm ci
        working-directory: v163-build

      - name: Download Go modules (v1.6.3)
        run: go mod download
        working-directory: v163-build

      - name: Build v1.6.3
        run: |
          hugo \
            --baseURL https://${REPO_OWNER}.github.io/${REPO_NAME}/v1.6.3 \
            --minify
        working-directory: v163-build

      - name: Merge v1.6.3 into site output
        run: |
          mkdir -p public/v1.6.3
          cp -r v163-build/public/* public/v1.6.3/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  # NOTE: Uncomment this job when the repo is made public.
