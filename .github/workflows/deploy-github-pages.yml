name: Deployment to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

env:
  REPO_NAME: ${{ github.event.repository.name }}
  REPO_OWNER: ${{ github.repository_owner }}
  HUGO_VERSION: "0.155.3"
  GO_VERSION: "1.22.0"

# Required for the modern deploy-pages action
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Install Go (direct, no Node.js dependency)
        run: |
          wget -O ${{ runner.temp }}/go.tar.gz \
            https://go.dev/dl/go${GO_VERSION}.linux-amd64.tar.gz
          sudo tar -C /usr/local -xzf ${{ runner.temp }}/go.tar.gz
          echo "/usr/local/go/bin" >> $GITHUB_PATH

      - name: Setup Hugo (direct install, no Node.js dependency)
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install npm dependencies
        run: npm ci

      - name: Download Go modules (Docsy)
        run: go mod download

      - name: Build main (v1.6.4)
        run: |
          hugo \
            --baseURL https://docs.heartsecsuite.com \
            --minify

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
